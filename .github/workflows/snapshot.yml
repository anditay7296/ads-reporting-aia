name: Daily Data Snapshot

on:
  schedule:
    # Run every day at 11:59 PM Malaysia Time (UTC+8 = 15:59 UTC)
    - cron: "59 15 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and save snapshot
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          mkdir -p data
          DATE=$(date -u +"%Y-%m-%d")
          curl -sL "$APPS_SCRIPT_URL" -o "data/snapshot-${DATE}.json"
          echo "Snapshot saved for ${DATE}"

      - name: Commit snapshot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +"%Y-%m-%d")
          git add data/
          git diff --staged --quiet || git commit -m "📊 Daily snapshot ${DATE}"
          git push
